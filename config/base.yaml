# config/base.yaml (safe defaults)
env: paper  # paper|canary|live

hyperliquid:
  rest_url: "https://api.hyperliquid.xyz"
  ws_url: "wss://api.hyperliquid.xyz/ws"
  account_address: "${HL_ACCOUNT_ADDRESS}"
  api_wallet_private_key: "${HL_API_WALLET_PRIVATE_KEY}"
  vault_address: ""  # optional

universe:
  top_n_by_liquidity: 8
  refresh_minutes: 60
  min_notional_24h: 100000000
  max_spread_bps: 3.0
  min_top_book_depth_usd: 200000

timeframes:
  regime: ["1h", "4h"]
  signal: ["15m"]
  execution: ["1m"]

risk:
  mode: cross  # cross or isolated (policy-driven)
  equity_risk_per_trade_min: 0.002
  equity_risk_per_trade_max: 0.01
  max_concurrent_positions: 4
  max_total_notional_multiple: 2.5
  daily_loss_limit_pct: 0.05
  weekly_loss_limit_pct: 0.12
  max_drawdown_pct: 0.18
  min_expected_rr: 1.8
  liquidation_buffer_pct: 0.25

execution:
  prefer_maker: true
  max_slippage_bps: 5.0
  max_order_retries: 3
  chase_seconds: 8
  post_only_on_entries: true

governance:
  require_walkforward: true
  require_robustness: true
  candidate_must_beat_baseline_by_utility: 0.05
  max_candidate_maxdd_pct: 0.20
  probation_days: 7

observability:
  prometheus_port: 9109
  log_level: "INFO"

storage:
  postgres_dsn: "${POSTGRES_DSN}"
  dataset_manifest_dir: "data/manifests"
